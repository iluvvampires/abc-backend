
spring.application.name=system

spring.datasource.url=jdbc:mysql://localhost:3306/animal_bite_clinic?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate ddl-auto (update creates/updates tables automatically, none disables it)
# We set to update so it creates the schema if it doesn't match perfectly, but since you ran the SQL, it will just validate.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8081

